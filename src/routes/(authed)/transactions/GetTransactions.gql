query GetTransactions(
	$did: String
	$limit: Int
	$offset: Int
	$byType: [String!]
	$byLedgerToFrom: String
) {
	findTransaction(
		filterOptions: {
			limit: $limit
			offset: $offset
			byAccount: $did
			byType: $byType
			byLedgerToFrom: $byLedgerToFrom
		}
	) @paginate {
		anchr_height
		anchr_ts
		first_seen
		id
		ledger {
			amount
			asset
			from
			memo
			to
			type
		}
		ops {
			data
			index
			type
		}
		output {
			id
			index
		}
		status
		type
	}
}
